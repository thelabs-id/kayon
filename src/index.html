<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Mirrors app.security.csp in tauri.conf.json. Kept here too so the policy holds however the
         UI is served, and so testing against a plain server sees the same rules the app enforces
         (an untested-because-absent CSP is how a viewer sandbox quietly stops being one). -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src 'self' http://127.0.0.1:9518 http://localhost:9518 http://127.0.0.1:* ipc: http://ipc.localhost; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; font-src 'self' data:; script-src 'self' 'wasm-unsafe-eval'; worker-src 'self' blob:; frame-src 'self'; object-src 'none'; base-uri 'self'; form-action 'none'" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>src</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
