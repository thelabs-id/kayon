# Build and publish a Kayon release (UPD).
#
# Why this exists: releases were built on one laptop, from whatever happened to be on its disk. That
# is how Kayon shipped an unidentifiable llama.cpp reporting `version: 1`, and how eight installers
# went out carrying a runtime nobody could name. Here the runtime comes from a pinned upstream tag
# with a checksum gate (scripts/fetch-runtime.ps1), so what ships is what runtime-pin.json says.
#
# What a release MUST contain for installed apps to see it (UPD-2):
#   - Kayon_<version>_x64-setup.exe        the NSIS installer, per-user (no UAC)
#   - Kayon_<version>_x64-setup.exe.sig    its minisign signature
#   - latest.json                          the manifest the updater polls
# Miss any one and every installed 1.5.x goes quiet: no error, just no updates ever again.
#
# The signing key is the boundary (UPD-3) — this downloads and runs an installer, so TLS is not a
# substitute. It lives outside the repo (~/.kayon-keys/) and reaches CI only as a secret. Losing it
# means existing installs can never accept another update; there is no recovery path but a manual
# reinstall by every user.

name: Release

on:
  push:
    tags: ['v*']
  # Lets a release be re-cut without moving a tag (e.g. a runner-side failure).
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build (e.g. v1.5.2)'
        required: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # create the release and upload artifacts

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      # The tag names the release; tauri.conf.json's version is what the updater actually compares
      # against (`package_info().version`). If they disagree, a v1.5.2 tag publishes a latest.json
      # advertising 1.5.1 and every installed 1.5.1 decides it is already up to date — a release
      # that fails by being silent. Assert rather than rewrite: the artifact must match the source
      # that was reviewed and tagged.
      - name: Version must match the tag
        shell: pwsh
        run: |
          $tag = '${{ github.event.inputs.tag || github.ref_name }}' -replace '^v', ''
          $cfg = (Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json).version
          if ($cfg -ne $tag) {
            throw "tag is v$tag but src-tauri/tauri.conf.json says $cfg. Installed apps compare against the config version, so this release would be invisible to them. Bump the version, commit, then re-tag."
          }
          Write-Host "version $cfg matches tag"

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # The pinned llama.cpp sidecar. The script fails the build on a checksum mismatch rather than
      # ship an unverified binary — the same gate every model download goes through (DL-3).
      - name: Stage pinned llama.cpp runtime
        run: pwsh scripts/fetch-runtime.ps1

      - name: Install frontend deps
        working-directory: src
        run: npm ci

      # `prebuild` vendors pdf.js into src/public/pdfjs (TOOL-8 renders PDFs offline, no CDN).
      - name: Build frontend
        working-directory: src
        run: npm run build

      # A release is gated on the tests, not just on compiling.
      - name: Test
        working-directory: src-tauri
        run: cargo test --locked

      - name: Build, sign and publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Without these the build still succeeds but emits no .sig, and latest.json is unusable:
          # every installed app rejects the update. Fail loudly instead — see the guard below.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: 'Kayon ${{ github.event.inputs.tag || github.ref_name }}'
          releaseBody: 'See the assets below. Windows will warn that the publisher is unknown: Kayon is not code-signed yet, which is separate from the update signature.'
          releaseDraft: true # a human reviews the notes before it goes live
          prerelease: false
          includeUpdaterJson: true

      # Proof, not assumption. An unsigned or wrongly-signed release does not fail loudly: it
      # publishes cleanly and every installed app then rejects or ignores it, which looks identical
      # to "no update available". So assert what installed apps actually require.
      - name: Verify updater artifacts
        shell: pwsh
        run: |
          $bundle = 'src-tauri/target/release/bundle/nsis'
          $setup = Get-ChildItem "$bundle/*-setup.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          $sig   = Get-ChildItem "$bundle/*-setup.exe.sig" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $setup) { throw "no installer in $bundle" }
          if (-not $sig) {
            throw "installer built but NOT signed. Every installed Kayon would reject this update. Is the TAURI_SIGNING_PRIVATE_KEY secret set?"
          }

          # A signature from the wrong key is worse than none: it looks like a real release and is
          # rejected by every install. The signature and the pubkey baked into the app both carry
          # the same minisign key id, so compare them instead of trusting the secret is the right one.
          #
          # The @() around each filter is load-bearing, not decoration: these blobs are two lines, so
          # dropping the comment leaves ONE line, Where-Object returns a bare string rather than an
          # array, and [0] then indexes its first *character*. Verified against a real 1.5.0 .sig and
          # the baked pubkey: without @() both ids come out empty and this gate fails every release.
          function Get-KeyId([byte[]]$b) { ($b[2..9] | ForEach-Object { $_.ToString('x2') }) -join '' }
          $pub = [Text.Encoding]::UTF8.GetString([Convert]::FromBase64String(
                   (Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json).plugins.updater.pubkey))
          $pubLine = @($pub -split "`n" | Where-Object { $_ -and $_ -notmatch '^untrusted comment:' })[0].Trim()
          $pubId = Get-KeyId ([Convert]::FromBase64String($pubLine))

          $sigText = [Text.Encoding]::UTF8.GetString([Convert]::FromBase64String((Get-Content $sig.FullName -Raw).Trim()))
          $sigLine = @($sigText -split "`n" | Where-Object { $_ -and $_ -notmatch '^untrusted comment:' })[0].Trim()
          $sigId = Get-KeyId ([Convert]::FromBase64String($sigLine))

          if (-not $pubId -or -not $sigId) { throw "could not read a key id from the signature or the baked pubkey (got '$sigId' / '$pubId')" }
          if ($pubId -ne $sigId) {
            throw "signed with key id $sigId but the app trusts $pubId. Every installed Kayon would reject this update. The TAURI_SIGNING_PRIVATE_KEY secret is not the key this build trusts."
          }

          # Without latest.json the updater has nothing to poll and installed apps see nothing.
          $manifest = Get-ChildItem 'src-tauri/target/release/bundle/**/latest.json','latest.json' -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $manifest) {
            Write-Host "::warning::latest.json not found locally; tauri-action generates it on the release itself (includeUpdaterJson). Confirm it is attached to the draft before publishing."
          } else {
            $v = (Get-Content $manifest.FullName -Raw | ConvertFrom-Json).version
            Write-Host "latest.json version: $v"
          }

          Write-Host "installer: $($setup.Name) ($([math]::Round($setup.Length/1MB,1)) MB)"
          Write-Host "signature: $($sig.Name) (key id $sigId, trusted)"
