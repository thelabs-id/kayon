# CAT-7: automated catalog refresh. Runs `catgen auto` on a schedule to keep the signed model
# catalog current from Hugging Face (most-downloaded GGUFs by trusted quantizers), then commits the
# regenerated, signed catalog.json + catalog.json.sig back to the repo. Kayon fetches these on launch
# (signature-verified, revision-gated), so users get a fresh list without any app update.
#
# Trust model: the ed25519 signing SEED lives ONLY as the KAYON_CATALOG_SEED repo secret. The public
# verifying key is baked into the app binary. A tampered catalog on GitHub would fail verification and
# be rejected — the host is never trusted, only the signature (CAT-5).
name: catalog-refresh

on:
  schedule:
    - cron: "17 6 * * *" # daily at 06:17 UTC
  workflow_dispatch: {} # allow manual runs from the Actions tab

permissions:
  contents: write # to commit the regenerated catalog back to the repo

concurrency:
  group: catalog-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: catgen-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}

      # Revision must strictly increase for Kayon to adopt (CAT-5). A UTC minute-stamp
      # (YYYYMMDDHHMM) is monotonic and human-legible, and always exceeds any hand-set bundled rev.
      - name: Compute revision
        id: rev
        run: echo "value=$(date -u +%Y%m%d%H%M)" >> "$GITHUB_OUTPUT"

      - name: Generate + sign catalog
        working-directory: src-tauri
        env:
          KAYON_CATALOG_SEED: ${{ secrets.KAYON_CATALOG_SEED }}
          KAYON_CATALOG_REVISION: ${{ steps.rev.outputs.value }}
        run: |
          if [ -z "$KAYON_CATALOG_SEED" ]; then
            echo "::error::KAYON_CATALOG_SEED secret is not set — cannot sign the catalog." >&2
            exit 1
          fi
          cargo run --quiet --bin catgen -- auto 20

      - name: Verify the catalog is signed and parseable
        working-directory: src-tauri
        run: |
          test -f catalog/catalog.json
          test -f catalog/catalog.json.sig
          python3 -c "import json,sys; c=json.load(open('catalog/catalog.json')); print('rev', c['revision'], 'models', len(c['entries'])); sys.exit(1 if not c['entries'] else 0)"

      - name: Commit if changed
        run: |
          git config user.name "kayon-catalog-bot"
          git config user.email "bot@thelabs.id"
          if git diff --quiet -- src-tauri/catalog/catalog.json src-tauri/catalog/catalog.json.sig; then
            echo "catalog unchanged — nothing to commit"
            exit 0
          fi
          git add src-tauri/catalog/catalog.json src-tauri/catalog/catalog.json.sig
          git commit -m "catalog: automated refresh (rev ${{ steps.rev.outputs.value }})"
          git push
